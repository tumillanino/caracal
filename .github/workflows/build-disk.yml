---
name: Build disk images

on:
  workflow_dispatch:
    inputs:
      upload-to-s3:
        description: "Upload to S3"
        required: false
        default: false
        type: boolean
      platform:
        required: true
        type: choice
        options:
          - amd64
          - arm64
  pull_request:
    branches:
      - main
    paths:
      - './disk_config/disk.toml'
      - './disk_config/iso.toml'
      - './.github/workflows/build-disk.yml'

env:
  IMAGE_NAME: ${{ github.event.repository.name }} # output of build.yml, keep in sync
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"  # do not edit
  DEFAULT_TAG: "latest"
  BIB_IMAGE: "quay.io/centos-bootc/bootc-image-builder:latest"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build disk images
    runs-on: ${{ inputs.platform == 'amd64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    strategy:
      fail-fast: false
      matrix:
        disk-type: ["qcow2", "bootc-installer"]
    permissions:
      contents: read
      packages: read
      id-token: write

    steps:
      - name: Prepare environment
        run: |
          USER_UID=$(id -u)
          USER_GID=$(id -g)
          IMAGE_REGISTRY_LOWER=${IMAGE_REGISTRY,,}
          IMAGE_NAME_LOWER=${IMAGE_NAME,,}
          # Concatenate the types with a hyphen
          DISK_TYPE=$(echo "${{ matrix.disk-type }}" | tr ' ' '-')
          # Lowercase the image uri
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY_LOWER}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME_LOWER}" >> ${GITHUB_ENV}
          echo "DISK_TYPE=${DISK_TYPE}" >> ${GITHUB_ENV}
          echo "USER_UID=${USER_UID}" >> ${GITHUB_ENV}
          echo "USER_GID=${USER_GID}" >> ${GITHUB_ENV}
          if [ "${{ matrix.disk-type }}" = "bootc-installer" ]; then
            echo "OUTPUT_DIR=${GITHUB_WORKSPACE}/output/bootc-installer" >> ${GITHUB_ENV}
            echo "INSTALLER_IMAGE=localhost/${IMAGE_NAME_LOWER}-installer:latest" >> ${GITHUB_ENV}
            echo "PAYLOAD_IMAGE=${IMAGE_REGISTRY_LOWER}/${IMAGE_NAME_LOWER}:${DEFAULT_TAG}" >> ${GITHUB_ENV}
            echo "LOCAL_PAYLOAD_IMAGE=localhost/${IMAGE_NAME_LOWER}:latest" >> ${GITHUB_ENV}
          fi

      - name: Install dependencies
        if: inputs.platform == 'arm64'
        run: |
          set -x
          sudo apt update -y
          sudo apt install -y \
            podman

      - name: Maximize build space
        if: inputs.platform != 'arm64'
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e # v9
        with:
          remove-codeql: true

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build disk images
        id: build
        if: matrix.disk-type != 'bootc-installer'
        uses: osbuild/bootc-image-builder-action@main
        with:
          builder-image: ${{ env.BIB_IMAGE }}
          config-file: ${{ matrix.disk-type == 'bootc-installer' && './disk_config/iso.toml' || './disk_config/disk.toml' }}
          image: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}
          chown: ${{ env.USER_UID }}:${{ env.USER_GID }}
          types: ${{ matrix.disk-type }}
          # Keep CI aligned with the local Justfile, which always builds Btrfs-backed images.
          additional-args: --use-librepo=True --rootfs=btrfs

      - name: Build installer container
        if: matrix.disk-type == 'bootc-installer'
        shell: bash
        run: |
          set -euo pipefail
          EFI_BOOT_PKG="grub2-efi-x64-cdboot"
          if [ "${{ inputs.platform }}" = "arm64" ]; then
            EFI_BOOT_PKG="grub2-efi-aa64-cdboot"
          fi

          podman build \
            --pull=newer \
            --build-arg BASE_IMAGE="${PAYLOAD_IMAGE}" \
            --build-arg EFI_BOOT_PKG="${EFI_BOOT_PKG}" \
            --tag "${INSTALLER_IMAGE}" \
            --file ./Containerfile.installer \
            .

      - name: Build bootc installer ISO
        if: matrix.disk-type == 'bootc-installer'
        shell: bash
        run: |
          set -euo pipefail
          sudo rm -rf /var/lib/containers/storage
          sudo mkdir -p /etc/containers
          printf '%s\n' \
            '[storage]' \
            'driver = "overlay"' \
            'runroot = "/run/containers/storage"' \
            'graphroot = "/var/lib/containers/storage"' \
            | sudo tee /etc/containers/storage.conf >/dev/null

          sudo podman pull "${PAYLOAD_IMAGE}"
          sudo podman tag "${PAYLOAD_IMAGE}" "${LOCAL_PAYLOAD_IMAGE}"
          podman save "${INSTALLER_IMAGE}" | sudo podman load
          sudo mkdir -p "${OUTPUT_DIR}"
          sudo podman run \
            --rm \
            --privileged \
            --pull=newer \
            --security-opt label=type:unconfined_t \
            --volume /var/lib/containers/storage:/var/lib/containers/storage \
            --volume "${OUTPUT_DIR}:/output" \
            --volume "${GITHUB_WORKSPACE}/disk_config/iso.toml:/config.toml:ro" \
            "${BIB_IMAGE}" \
            --output /output \
            --chown "${USER_UID}:${USER_GID}" \
            --use-librepo=True \
            --rootfs=btrfs \
            --local \
            --type bootc-installer \
            --bootc-installer-payload-ref "${LOCAL_PAYLOAD_IMAGE}" \
            "${INSTALLER_IMAGE}"

      - name: Upload disk images and Checksum to Job Artifacts
        if: inputs.upload-to-s3 != true && github.event_name != 'pull_request'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ env.IMAGE_NAME }}-${{ inputs.platform || 'amd64' }}-${{ matrix.disk-type }}
          path: ${{ matrix.disk-type == 'bootc-installer' && './output/bootc-installer' || steps.build.outputs.output-directory }}
          if-no-files-found: error
          retention-days: 0
          compression-level: 0
          overwrite: true
      
      - name: Upload to S3
        if: inputs.upload-to-s3 == true && github.event_name != 'pull_request'
        shell: bash
        env:
          RCLONE_CONFIG_S3_TYPE: s3
          RCLONE_CONFIG_S3_PROVIDER: ${{ secrets.S3_PROVIDER }}
          RCLONE_CONFIG_S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          RCLONE_CONFIG_S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_S3_REGION: ${{ secrets.S3_REGION }}
          RCLONE_CONFIG_S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          SOURCE_DIR: ${{ matrix.disk-type == 'bootc-installer' && './output/bootc-installer' || steps.build.outputs.output-directory }}
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone
          rclone copy $SOURCE_DIR S3:${{ secrets.S3_BUCKET_NAME }}
