css: |
  .caracal-section banner {
    margin-top: 30px;
    margin-left: 30px;
    margin-right: 30px;
    border-radius: 10px;
  }
  .caracal-section banner-text-overlay {
    margin: 30px;
    padding: 20px;
  }
  .caracal-section banner-text {
    padding: 50px;
    color: #ffffff;
  }
  .caracal-section title {
    color: #ffffff;
  }
  .caracal-section subtitle {
    color: #ffffff;
    font-weight: 400;
  }
  .caracal-section {
    margin: 15px;
    border-radius: 25px;
  }
  .caracal-light-section app-tile > button {
    background-color: alpha(lightgray, 0.4);
  }
  .daw-section {
    background: linear-gradient(45deg, #1a0a2e, #3d1a6e);
  }
  .music-section {
    background: linear-gradient(135deg, #0d2b1a, #1a5c35);
  }
  .communication-section {
    background: linear-gradient(45deg, #0a1a35, #1a3a6e);
  }
  .creative-section {
    background: linear-gradient(135deg, #2b1a0a, #6e3d1a);
  }
  .utilities-section {
    background: linear-gradient(45deg, #1a1a1a, #3d3d3d);
  }

rows:
  - sections:
    - expand-horizontally: true
      classes:
        - caracal-section
        - daw-section
      light-classes:
        - caracal-light-section
      category:
        title:
          en: "DAWs & Recording"
        subtitle:
          en: "Optional DAWs to complement your studio"
        banner: file:///usr/share/wallpapers/caracal/caracal-lake.png
        banner-fit: cover
        banner-height: 300
        banner-text-halign: start
        banner-text-valign: center
        banner-text-label-xalign: 0.0
        appids:
          - com.bitwig.BitwigStudio
